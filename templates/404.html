{% extends "base.html" %}

{% block title %}Page Not Found - Notes App{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-message">Oops! This page does not exist.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">
            ← Back to Notes
        </a>
    </div>
</div>
{% endblock %}
