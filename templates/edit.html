{% extends "base.html" %}

{% block title %}Edit Note - Notes App{% endblock %}

{% block content %}
<div class="content-wrapper">
    <section class="edit-note-section">
        <div class="edit-header">
            <h2>Edit Note</h2>
            <p class="edit-meta">Created: {{ note.created_at.strftime('%B %d, %Y at %I:%M %p') }}</p>
        </div>

        <form method="POST" action="{{ url_for('edit', id=note.id) }}" class="note-form">
            <div class="form-group">
                <label for="title">Title *</label>
                <input
                    type="text"
                    id="title"
                    name="title"
                    value="{{ note.title }}"
                    placeholder="Enter note title..."
                    required
                    maxlength="200"
                    autocomplete="off"
                >
            </div>

            <div class="form-group">
                <label for="content">Content *</label>
                <textarea
                    id="content"
                    name="content"
                    placeholder="Enter note content..."
                    rows="10"
                    required
                >{{ note.content }}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    ✓ Save Changes
                </button>

                <a href="{{ url_for('index') }}" class="btn btn-secondary">
                    ← Back to Notes
                </a>

                <form method="POST" action="{{ url_for('delete', id=note.id) }}" style="display: inline;">
                    <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this note? This cannot be undone.');">
                        🗑 Delete Note
                    </button>
                </form>
            </div>
        </form>
    </section>
</div>
{% endblock %}
